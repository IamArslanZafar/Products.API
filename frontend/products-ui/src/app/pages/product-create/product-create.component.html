<div class="modal-header">
  <h2>New Product</h2>
  <button type="button" class="close-button" (click)="cancelled.emit()">
    <span class="material-symbols-outlined">close</span>
  </button>
</div>

<form [formGroup]="form" (ngSubmit)="submit()" class="form">
  <div class="field">
    <label for="name">Name</label>
    <input id="name" type="text" formControlName="name" placeholder="e.g. Quantum Nexus Hub" />
    @if (form.controls.name.invalid && form.controls.name.touched) {
      <p class="field-error">Name is required.</p>
    }
  </div>

  <div class="field">
    <label for="colour">Colour</label>
    <input id="colour" type="text" formControlName="colour" placeholder="e.g. Indigo" />
    @if (form.controls.colour.invalid && form.controls.colour.touched) {
      <p class="field-error">Colour is required.</p>
    }
  </div>

  <div class="field">
    <label for="price">Price</label>
    <input id="price" type="number" step="0.01" formControlName="price" placeholder="0.00" />
    @if (form.controls.price.invalid && form.controls.price.touched) {
      <p class="field-error">Price must be zero or greater.</p>
    }
  </div>

  <div class="modal-actions">
    <button type="button" class="cancel-button" (click)="cancelled.emit()">Cancel</button>
    <button type="submit" class="submit-button" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Saving…' : 'Create Product' }}
    </button>
  </div>
</form>
